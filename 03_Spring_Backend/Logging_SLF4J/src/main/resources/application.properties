# Spring Boot Logging Configuration
# Set the root level to INFO, but allow our custom package to show DEBUG logs if needed
logging.level.root=INFO
logging.level.com.digitalnurture=DEBUG

# Customize the log output format slightly for better readability in the terminal
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n